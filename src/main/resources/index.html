<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор напольного покрытия</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a
        class="github-fork-ribbon right-top fixed"
        href="https://github.com/jrosn/floormate/fork"
        data-ribbon="Fork me on GitHub"
        target="_blank"
        rel="noopener noreferrer"
    >Fork me on GitHub</a>

    <div class="container">
        <h1>Калькулятор напольного покрытия</h1>

        <div class="main-layout">
            <div class="form-panel">
                <form id="params-form" class="params-form" onsubmit="return false;">
                    <div class="form-group">
                        <label for="room-length">Длина комнаты (мм)</label>
                        <input type="number" id="room-length" value="5000" min="1" step="1">
                    </div>
                    <div class="form-group">
                        <label for="room-width">Ширина комнаты (мм)</label>
                        <input type="number" id="room-width" value="4000" min="1" step="1">
                    </div>
                    <div class="form-group">
                        <label for="panel-length">Длина панели (мм)</label>
                        <input type="number" id="panel-length" value="1380" min="1" step="1">
                    </div>
                    <div class="form-group">
                        <label for="panel-width">Ширина панели (мм)</label>
                        <input type="number" id="panel-width" value="193" min="1" step="1">
                    </div>
                    <div class="form-group">
                        <label for="min-trim">Мин. длина обреза (мм)</label>
                        <input type="number" id="min-trim" value="300" min="1" step="1">
                    </div>
                    <div class="form-group">
                        <label for="wall-gap">Отступ от стены (мм)</label>
                        <input type="number" id="wall-gap" value="10" min="0" step="1">
                    </div>
                    <div class="form-group">
                        <label for="offset">Смещение швов</label>
                        <select id="offset">
                            <option value="HALF" selected>1/2 панели</option>
                            <option value="THIRD">1/3 панели</option>
                            <option value="RANDOM">Хаотичное (обрезки)</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="btn-calc" class="btn btn-primary">Рассчитать</button>
                        <button type="button" id="btn-download" class="btn btn-secondary">Скачать PNG</button>
                    </div>
                </form>

                <div id="error" class="error"></div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="floor-canvas"></canvas>
            </div>
        </div>

        <footer class="app-footer">
            <p>
                С <span class="heart" aria-hidden="true">♥</span> от
                <a class="github-link" href="https://github.com/jrosn" target="_blank" rel="noopener noreferrer" aria-label="GitHub: jrosn" title="github.com/jrosn">
                    <svg class="github-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                </a>
                для <span class="dedicated-to">Мари</span>
            </p>
        </footer>
    </div>

    <script src="floormate.js"></script>
</body>
</html>
